services:
  app:
    container_name: react-app
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command:
      - sh
      - -c
      - |
        if [ -f package.json ]; then
          npm run dev
        else
          echo "package.json not found. Run create-next-app inside the container first."
          tail -f /dev/null
        fi

volumes:
  node_modules:
